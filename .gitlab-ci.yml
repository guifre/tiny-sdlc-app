stages:
  - validate
  - build
  - security

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

default:
  interruptible: true

variables:
  EXAMPLE_DIR: "examples/python-flask"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  GIT_DEPTH: "0"

cache:
  paths:
    - .cache/pip

validate:
  stage: validate
  image: python:3.12-slim
  script:
    - sh ci/scripts/validate-python-example.sh

docker-build:
  stage: build
  image: docker:27.5.1
  services:
    - docker:27.5.1-dind
  script:
    - IMAGE_TAG=tiny-sdlc-app:ci sh ci/scripts/build-python-example-image.sh

semgrep:
  stage: security
  image: semgrep/semgrep:latest
  allow_failure: true
  script:
    - OUTPUT_PATH="$CI_PROJECT_DIR/semgrep.sarif" sh ci/scripts/run-semgrep.sh
  artifacts:
    when: always
    paths:
      - semgrep.sarif

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:8.24.2
    entrypoint: [""]
  allow_failure: true
  script:
    - OUTPUT_PATH="$CI_PROJECT_DIR/gitleaks.sarif" sh ci/scripts/run-gitleaks.sh
  artifacts:
    when: always
    paths:
      - gitleaks.sarif

checkov:
  stage: security
  image:
    name: bridgecrew/checkov:3.2.521
    entrypoint: [""]
  allow_failure: true
  script:
    - OUTPUT_PATH="$CI_PROJECT_DIR/checkov.sarif" sh ci/scripts/run-checkov.sh
  artifacts:
    when: always
    paths:
      - checkov.sarif
