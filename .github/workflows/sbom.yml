name: SBOM

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Generate SBOM and submit dependency snapshot
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          artifact-name: tiny-sdlc-app.spdx.json
          dependency-snapshot: true
          upload-artifact: true
          upload-release-assets: false
