name: OSV-Scanner

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 12 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  dependency-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      fail-on-vuln: false
      upload-sarif: true
      results-file-name: osv-results.sarif
