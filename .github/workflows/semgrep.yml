name: Semgrep CE

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Semgrep CE
        run: semgrep scan --config auto
