name: Semgrep CE

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  EXAMPLE_DIR: examples/python-flask

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Semgrep CE
        env:
          OUTPUT_PATH: ${{ github.workspace }}/semgrep.sarif
        run: sh ci/scripts/run-semgrep.sh

      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-ce
