name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  EXAMPLE_DIR: examples/python-flask

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python example
        run: sh ci/scripts/validate-python-example.sh

      - name: Build example Docker image
        env:
          IMAGE_TAG: tiny-sdlc-app:ci
        run: sh ci/scripts/build-python-example-image.sh
