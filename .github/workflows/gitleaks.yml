name: Gitleaks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        uses: gacts/gitleaks@v1.3.2
        with:
          fail-on-error: false

      - name: Upload Gitleaks SARIF artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-sarif
          path: ${{ steps.gitleaks.outputs.sarif }}

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.gitleaks.outputs.sarif }}
          category: gitleaks
