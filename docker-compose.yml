services:
  web:
    build:
      context: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+psycopg://appuser:apppassword@db:5432/appdb
      DB_CONNECT_RETRIES: "30"
      DB_CONNECT_DELAY: "2"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/healthz')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
